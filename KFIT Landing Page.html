  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"4b2e5e3b-2737-4337-8d09-c41d01e2d3d4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"da408cee-d760-4330-a224-77c9cbf80162\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"4b2e5e3b-2737-4337-8d09-c41d01e2d3d4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"88583d0d-9e15-4086-acec-04bedd8b0401\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"03d19fb3-dd3f-4537-a75c-41e3bf871ba8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Pinyon Script';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"70262420-9135-423d-86d6-c009fbf32acf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n<style>\n:root {\n  --bg: #060606;\n  --rose: #f7abab;\n  --rose-dark: #C9957A;\n  --rose-light: #fdd5d5;\n  --off-white: #F2EDE8;\n  --d1: #111111; --d2: #1C1C1C; --d3: #2A2A2A;\n  --muted: #5A5A5A;\n}\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody { background: var(--bg); color: var(--off-white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; cursor: none; }\n\n/* GRAIN — generated via canvas to avoid SVG filter URL refs */\nbody::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:9000; opacity:.038;\n  background-image: var(--grain-url, none);\n  background-size:200px 200px; }\n\n/* ── CURSOR ── */\n#cursor-dot { position:fixed; width:8px; height:8px; background:var(--rose); border-radius:50%; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); transition:transform .1s, background .2s, width .25s, height .25s; mix-blend-mode:difference; }\n#cursor-ring { position:fixed; width:36px; height:36px; border:1px solid rgba(247,171,171,.5); border-radius:50%; pointer-events:none; z-index:99998; transform:translate(-50%,-50%); transition:transform .18s cubic-bezier(.25,.46,.45,.94), width .3s, height .3s, opacity .3s; }\nbody:has(a:hover,button:hover,.product-card:hover) #cursor-dot { width:14px; height:14px; }\nbody:has(a:hover,button:hover,.product-card:hover) #cursor-ring { width:56px; height:56px; border-color:rgba(247,171,171,.8); }\n\n/* ── DEMO BAR ── */\n.demo-bar { position:fixed; top:0; left:0; right:0; z-index:1000; background:var(--rose); color:#060606; font-family:'Bebas Neue',sans-serif; font-size:.8rem; letter-spacing:.2em; text-align:center; padding:6px 0; }\n\n/* ── NAV ── */\nnav { position:fixed; top:29px; left:0; right:0; z-index:999; padding:20px 48px; display:flex; align-items:center; justify-content:space-between; transition:background .4s, backdrop-filter .4s; }\nnav.scrolled { background:rgba(6,6,6,.88); backdrop-filter:blur(16px); border-bottom:1px solid rgba(247,171,171,.1); }\n.nav-logo .wordmark { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:.12em; }\n.nav-logo .sub { font-size:.55rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); display:block; margin-top:1px; }\n.nav-cta { border:1.5px solid var(--rose); color:var(--rose); background:transparent; font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; padding:10px 24px; cursor:none; transition:background .25s, color .25s; }\n.nav-cta:hover { background:var(--rose); color:#060606; }\n\n/* ── HERO ── */\n.hero { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; padding-top:29px; perspective:1200px; }\n\n.hero-left { display:flex; flex-direction:column; justify-content:center; padding:120px 64px 80px; position:relative; }\n\n.hero-hl-char { font-family:'Bebas Neue',sans-serif; font-size:clamp(9rem,14vw,17rem); line-height:.86; color:var(--off-white); letter-spacing:-.02em; display:block; will-change:transform; transition:transform .08s linear; }\n\n.hero-tagline { font-family:'DM Sans',sans-serif; font-style:italic; font-weight:300; color:var(--rose); font-size:clamp(1rem,1.6vw,1.5rem); margin-top:28px; letter-spacing:.04em; }\n\n.hero-wa { display:inline-flex; align-items:center; gap:10px; margin-top:36px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09); backdrop-filter:blur(8px); padding:12px 22px; border-radius:100px; font-size:.82rem; font-weight:500; letter-spacing:.08em; text-decoration:none; color:var(--off-white); width:fit-content; transition:background .25s,border-color .25s; cursor:none; }\n.hero-wa:hover { background:rgba(247,171,171,.1); border-color:var(--rose); }\n.pulse-dot { width:9px;height:9px;border-radius:50%;background:#25D366;flex-shrink:0; animation:pg 2s infinite; }\n@keyframes pg { 0%{box-shadow:0 0 0 0 rgba(37,211,102,.6)} 70%{box-shadow:0 0 0 8px rgba(37,211,102,0)} 100%{box-shadow:0 0 0 0 rgba(37,211,102,0)} }\n\n/* ══════════════════════════════════════\n   HERO RIGHT — Aceternity Lamp (pure CSS)\n   ══════════════════════════════════════ */\n.hero-right {\n  position:relative; overflow:hidden;\n  display:flex; align-items:center; justify-content:center;\n  background: #020617; /* slate-950 */\n}\n\n/* ── LAMP SCENE wrapper (scale-y-125 equivalent) ── */\n.lamp-scene {\n  position:absolute; inset:0;\n  z-index:1; pointer-events:none;\n  display:flex; align-items:center; justify-content:center;\n  transform: scaleY(1.25);\n  transform-origin: center center;\n}\n\n/* ── LEFT conic: from_70deg_at_center_top → cyan → transparent ── */\n.lamp-left {\n  position:absolute;\n  /* right-1/2 → right edge at center */\n  right:50%; top:0;\n  width:480px; height:224px; /* ~30rem × 14rem */\n  overflow:visible;\n  background: conic-gradient(from 70deg at center top,\n    #06b6d4 0deg,        /* cyan-500 */\n    transparent 25deg,\n    transparent 360deg\n  );\n  /* entry animation: width 15rem→30rem, opacity .5→1 */\n  animation: lamp-in-l .8s .3s cubic-bezier(.4,0,.2,1) both;\n  /* mask: hide bottom & left edge bleed like the original */\n}\n/* mask bottom fade */\n.lamp-left::after {\n  content:''; position:absolute; bottom:0; left:0; width:100%; height:160px;\n  background:linear-gradient(to top, #020617, transparent);\n  z-index:2;\n}\n/* mask left edge */\n.lamp-left::before {\n  content:''; position:absolute; top:0; left:0; width:160px; height:100%;\n  background:linear-gradient(to right, #020617, transparent);\n  z-index:2;\n}\n\n/* ── RIGHT conic: from_290deg_at_center_top → transparent → cyan ── */\n.lamp-right {\n  position:absolute;\n  left:50%; top:0;\n  width:480px; height:224px;\n  overflow:visible;\n  background: conic-gradient(from 290deg at center top,\n    transparent 0deg,\n    transparent 335deg,\n    #06b6d4 360deg       /* cyan-500 */\n  );\n  animation: lamp-in-r .8s .3s cubic-bezier(.4,0,.2,1) both;\n}\n.lamp-right::after {\n  content:''; position:absolute; bottom:0; right:0; width:100%; height:160px;\n  background:linear-gradient(to top, #020617, transparent);\n  z-index:2;\n}\n.lamp-right::before {\n  content:''; position:absolute; top:0; right:0; width:160px; height:100%;\n  background:linear-gradient(to left, #020617, transparent);\n  z-index:2;\n}\n\n/* blur blobs */\n/* large blur mask below center */\n.lamp-blur-cover {\n  position:absolute; top:50%; left:0; right:0;\n  height:192px; /* h-48 */\n  transform: translateY(48px) scaleX(1.5); /* translate-y-12 scale-x-150 */\n  background:#020617;\n  filter:blur(40px);\n  z-index:10;\n}\n/* backdrop blur strip */\n.lamp-bd {\n  position:absolute; top:50%; left:0; right:0;\n  height:192px;\n  backdrop-filter:blur(12px);\n  -webkit-backdrop-filter:blur(12px);\n  opacity:.1;\n  z-index:12;\n}\n/* BIG ellipse glow */\n.lamp-glow-big {\n  position:absolute;\n  /* inset-auto -translate-y-1/2 → vertically centered, at scaleY layer */\n  top:50%; left:50%;\n  transform:translate(-50%,-50%);\n  width:448px; height:144px; /* 28rem × 9rem */\n  border-radius:50%;\n  background:#06b6d4; /* cyan-500 */\n  opacity:.5;\n  filter:blur(64px);\n  z-index:13;\n  animation: lamp-in-w .8s .3s cubic-bezier(.4,0,.2,1) both;\n}\n/* SMALL ellipse glow */\n.lamp-glow-sm {\n  position:absolute;\n  top:50%; left:50%;\n  transform:translate(-50%, calc(-50% - 96px)); /* -translate-y-[6rem] */\n  width:256px; height:144px; /* w-64 h-36 */\n  border-radius:50%;\n  background:#22d3ee; /* cyan-400 */\n  filter:blur(32px);\n  z-index:11;\n  animation: lamp-in-sm .8s .3s cubic-bezier(.4,0,.2,1) both;\n}\n/* THE LINE — thin horizontal bar */\n.lamp-line {\n  position:absolute;\n  top:50%; left:50%;\n  transform:translate(-50%, calc(-50% - 112px));\n  width:480px; height:2px;\n  background:#22d3ee;\n  z-index:14;\n  animation: lamp-in-line .8s .3s cubic-bezier(.4,0,.2,1) both;\n}\n/* cover mask above lamp */\n.lamp-top-cover {\n  position:absolute; inset:auto 0 0 0;\n  height:176px;\n  top: calc(50% - 200px);\n  background:#020617;\n  z-index:15;\n}\n\n/* ══ SLIDING VERTICAL BARS ══\n   Two glowing vertical lines that start at center\n   and slide outward to the edges, looping endlessly */\n.vbar-left,\n.vbar-right {\n  position:absolute;\n  top:25%; height:50%;\n  width:6px;\n  z-index:22;\n  border-radius:3px;\n  box-shadow:\n    0 0 12px 4px rgba(34,211,238,.95),\n    0 0 32px 10px rgba(6,182,212,.65),\n    0 0 70px 20px rgba(6,182,212,.3),\n    0 0 120px 40px rgba(6,182,212,.12);\n  background: linear-gradient(to bottom,\n    transparent 0%,\n    rgba(34,211,238,.8) 10%,\n    #22d3ee 50%,\n    rgba(34,211,238,.8) 90%,\n    transparent 100%\n  );\n}\n\n/* LEFT bar: starts at center (50%), slides to 8% */\n.vbar-left {\n  left:50%;\n  animation: vbar-slide-left 2.8s cubic-bezier(.77,0,.18,1) infinite;\n}\n/* RIGHT bar: starts at center (50%), slides to 92% */\n.vbar-right {\n  left:50%;\n  animation: vbar-slide-right 2.8s cubic-bezier(.77,0,.18,1) infinite;\n}\n\n@keyframes vbar-slide-left {\n  0%   { left:50%; opacity:0; }\n  8%   { opacity:1; }\n  60%  { left:8%;  opacity:1; }\n  85%  { left:8%;  opacity:0; }\n  100% { left:8%;  opacity:0; }\n}\n@keyframes vbar-slide-right {\n  0%   { left:50%; opacity:0; }\n  8%   { opacity:1; }\n  60%  { left:92%; opacity:1; }\n  85%  { left:92%; opacity:0; }\n  100% { left:92%; opacity:0; }\n}\n\n/* ── ANIMATIONS ── */\n@keyframes lamp-in-l {\n  from { width:240px; opacity:.5; }\n  to   { width:480px; opacity:1; }\n}\n@keyframes lamp-in-r {\n  from { width:240px; opacity:.5; }\n  to   { width:480px; opacity:1; }\n}\n@keyframes lamp-in-w {\n  from { width:240px; opacity:.3; }\n  to   { width:448px; opacity:.5; }\n}\n@keyframes lamp-in-sm {\n  from { width:128px; }\n  to   { width:256px; }\n}\n@keyframes lamp-in-line {\n  from { width:240px; }\n  to   { width:480px; }\n}\n\n/* ── MODEL / placeholder below lamp ── */\n.hero-model-wrap {\n  position:relative; z-index:20;\n  display:flex; flex-direction:column; align-items:center; justify-content:center;\n  /* -translate-y-80 equivalent but adapted to hero layout */\n  margin-top: 180px; /* push below the lamp glow */\n  width:58%;\n}\n\n.hero-model-label {\n  font-family:'DM Mono',monospace; font-size:.55rem; letter-spacing:.18em;\n  color:rgba(90,160,200,.45); white-space:nowrap;\n  text-align:center; margin-top:12px;\n  animation: lamp-text-in .8s .3s cubic-bezier(.4,0,.2,1) both;\n}\n\n@keyframes lamp-text-in {\n  from { opacity:.5; transform:translateY(40px); }\n  to   { opacity:1;  transform:translateY(0); }\n}\n\n.hero-wm { position:absolute; font-family:'Pinyon Script',cursive; font-size:clamp(10rem,16vw,22rem); color:#06b6d4; opacity:.015; user-select:none; pointer-events:none; z-index:0; transition:transform .12s linear; will-change:transform; }\n\n.hero-corner { position:absolute; bottom:40px; right:-12px; font-family:'Bebas Neue',sans-serif; font-size:.8rem; letter-spacing:.3em; color:var(--muted); writing-mode:vertical-rl; transform:rotate(180deg); opacity:.5; z-index:25; }\n\n/* ── TICKER ── */\n.ticker-belt { overflow:hidden; }\n.ticker-strip { padding:13px 0; white-space:nowrap; display:flex; overflow:hidden; }\n.ticker-strip.t-rose { background:var(--rose); }\n.ticker-strip.t-dark { background:var(--d2); }\n.ticker-content { display:inline-flex; animation:scroll-l 20s linear infinite; }\n.ticker-stri A SECTION ── */\n.cta-section { background:var(--d1); padding:120px 48px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; min-height:620px; }\n.fc-bg { position:absolute; inset:0; pointer-events:none; }\n.fc { position:absolute; border-radius:50%; animation:drift linear infinite; filter:blur(2px); }\n@keyframes drift { 0%{transform:translateY(0) translateX(0) scale(1)} 33%{transform:translateY(-28px) translateX(18px) scale(1.06)} 66%{transform:translateY(14px) translateX(-14px) scale(.94)} 100%{transform:translateY(0) translateX(0) scale(1)} }\n.cta-card { position:relative; z-index:1; background:rgba(20,20,20,.5); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px); border:1px solid rgba(247,171,171,.13); padding:80px 100px; text-align:center; max-width:680px; width:100%; }\n.cta-card::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(247,171,171,.05) 0%, transparent 70%); pointer-events:none; }\n.cta-headline { font-family:'Bebas Neue',sans-serif; font-size:clamp(4rem,9vw,9rem); letter-spacing:.06em; color:var(--off-white); line-height:.9; margin-bottom:24px; }\n.cta-sub { font-size:.95rem; color:var(--muted); font-weight:300; line-height:1.7; margin-bottom:40px; }\n.cta-btn { display:inline-flex; align-items:center; gap:12px; background:var(--rose); color:#060606; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.14em; padding:16px 40px; text-decoration:none; cursor:none; transition:background .25s, transform .2s; border:none; }\n.cta-btn:hover { background:var(--rose-light); transform:translateY(-3px); }\n\n/* ── FOOTER ── */\nfooter { background:var(--bg); padding:80px 48px 32px; position:relative; overflow:hidden; border-top:1px solid rgba(247,171,171,.07); }\n.footer-wm { position:absolute; font-family:'Pinyon Script',cursive; font-size:clamp(10rem,20vw,24rem); color:var(--off-white); opacity:.022; bottom:-40px; right:-20px; 998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z\"><\u002Fpath><\u002Fsvg>\n      Escribir por WhatsApp\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 9. FOOTER -->\n<footer>\n  <div class=\"footer-wm\">Kfit<\u002Fdiv>\n  <div class=\"footer-grid\">\n    <div>\n      <div class=\"footer-logo\">KFIT<\u002Fdiv>\n      <p class=\"footer-desc\">Ropa deportiva boutique desde Cancún, Quintana Roo. Diseñada para mover todo lo que tienes, con el ajuste que te mereces.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>Productos<\u002Fh4>\n      <ul>\n        <li>Leggings<\u002Fli><li>Sport Bras<\u002Fli><li>Conjuntos<\u002Fli><li>Shorts<\u002Fli><li>Accesorios<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>Contacto<\u002Fh4>\n      <ul>\n        <li>WhatsApp: +52 998 243 8046<\u002Fli><li>@kfit.cancun<\u002Fli><li>Cancún, Q. Roo, México<\u002Fli><li>Lun–Sáb 10am–7pm<\u002Fli><li>Dom 12pm–5pm<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-bottom\">\n    <span class=\"footer-copy\">© 2026 KFIT — Todos los derechos reservados<\u002Fspan>\n    <div class=\"socials\">\n      <a href=\"#\">INSTAGRAM<\u002Fa><a href=\"#\">TIKTOK<\u002Fa><a href=\"#\">FACEBOOK<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS -->\n<div id=\"tweaks-panel\">\n  <h3>Tweaks<\u002Fh3>\n  <div class=\"tw-row\"><label>COLOR ROSA<\u002Flabel><input type=\"color\" id=\"tw-rose\" value=\"#f7abab\"><\u002Fdiv>\n  <div class=\"tw-row\"><label>TICKER<\u002Flabel><div class=\"tw-tog on\" id=\"tw-ticker\" onclick=\"toggleTicker()\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"tw-row\"><label>GRAIN<\u002Flabel><div class=\"tw-tog on\" id=\"tw-grain\" onclick=\"toggleGrain()\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"tw-row\"><label>3D CARDS<\u002Flabel><div class=\"tw-tog on\" id=\"tw-3d\" onclick=\"toggle3D()\"><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── GRAIN (canvas-generated, no external refs)\n(function(){\n  const c = document.createElement('canvas'); c.width=200; c.height=200;\n  const ctx = c.getContext('2d');\n  const img = ctx.createImageData(200,200);\n  for(let i=0;i<img.data.length;i+=4){\n    const v=Math.random()*255|0;\n    img.data[i]=v; img.data[i+1]=v; img.data[i+2]=v; img.data[i+3]=255;\n  }\n  ctx.putImageData(img,0,0);\n  document.documentElement.style.setProperty('--grain-url','url('+c.toDataURL()+')');\n})();\n\n// ── CURSOR\nconst dot = document.getElementById('cursor-dot');\nconst ring = document.getElementById('cursor-ring');\nlet mx=0,my=0,rx=0,ry=0;\ndocument.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });\n(function animRing(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();\n\n// ── NAV\nwindow.addEventListener('scroll', () => {\n  document.getElementById('main-nav').classList.toggle('scrolled', scrollY > 60);\n});\n\n// ── HERO MOUSE PARALLAX\nconst heroEl = document.getElementById('hero');\nconst heroChars = document.querySelectorAll('.hero-hl-char');\nconst heroWm = document.getElementById('hero-wm');\nconst heroPhoto = document.getElementById('hero-photo');\n\ndocument.addEventListener('mousemove', e => {\n  if (!heroEl) return;\n  const rect = heroEl.getBoundingClientRect();\n  if (rect.bottom < 0) return;\n  const cx = (e.clientX / window.innerWidth - .5) * 2;\n  const cy = (e.clientY / window.innerHeight - .5) * 2;\n  heroChars.forEach(c => {\n    const d = parseFloat(c.dataset.depth);\n    c.style.transform = `translate(${cx*d*60}px, ${cy*d*30}px)`;\n  });\n  heroWm.style.transform = `translate(${cx*18}px, ${cy*12}px)`;\n  heroPhoto.style.transform = `translate(${cx*-12}px, ${cy*-8}px)`;\n});\n\n// ── 3D CARD TILT\nlet tiltEnabled = true;\ndocument.querySelectorAll('.product-card').forEach(card => {\n  card.addEventListener('mousemove', e => {\n    if (!tiltEnabled) return;\n    const r = card.getBoundingClientRect();\n    const x = (e.clientX - r.left) / r.width - .5;\n    const y = (e.clientY - r.top) / r.height - .5;\n    card.style.transform = `perspective(900px) rotateY(${x*14}deg) rotateX(${-y*10}deg) scale3d(1.02,1.02,1.02)`;\n  });\n  card.addEventListener('mouseleave', () => {\n    card.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg) scale3d(1,1,1)';\n    card.style.transition = 'transform .5s ease, border-color .3s, box-shadow .3s';\n    setTimeout(() => card.style.transition = '', 500);\n  });\n  card.addEventListener('mouseenter', () => { card.style.transition = 'border-color .3s, box-shadow .3s'; });\n});\n\n// ── SCROLL REVEALS\nconst obs = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: .1 });\ndocument.querySelectorAll('.reveal').forEach(el => obs.observe(el));\n\n// ── FILOSOFÍA CLIP-PATH REVEAL\nconst fpObs = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('revealed'); });\n}, { threshold: .15 });\ndocument.querySelectorAll('.fil-panel').forEach(el => fpObs.observe(el));\n\n// ── COUNT-UP STATS\nconst cntObs = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if (!e.isIntersecting) return;\n    const el = e.target.querySelector('[data-target]');\n    if (!el) return;\n    const target = parseInt(el.dataset.target);\n    const suffix = target === 100 ? '%' : (target === 500 ? '+' : '');\n    let cur = 0;\n    const step = Math.ceil(target / 40);\n    const id = setInterval(() => {\n      cur = Math.min(cur + step, target);\n      el.textContent = cur + suffix;\n      if (cur >= target) clearInterval(id);\n    }, 30);\n    cntObs.unobserve(e.target);\n  });\n}, { threshold: .3 });\ndocument.querySelectorAll('.stat-block').forEach(el => cntObs.observe(el));\n\n// ── SPOTLIGHT CARDS\ndocument.querySelectorAll('.scard').forEach(card => {\n  card.addEventListener('mousemove', e => {\n    const r = card.getBoundingClientRect();\n    const x = ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%';\n    const y = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';\n    card.style.setProperty('--mx', x);\n    card.style.setProperty('--my', y);\n    // 3D tilt\n    const tx = (e.clientX - r.left) / r.width - .5;\n    const ty = (e.clientY - r.top)  / r.height - .5;\n    card.style.transform = `perspective(1000px) rotateY(${tx*10}deg) rotateX(${-ty*8}deg)`;\n  });\n  card.addEventListener('mouseleave', () => {\n    card.style.setProperty('--mx', '50%');\n    card.style.setProperty('--my', '50%');\n    card.style.transform = '';\n  });\n});\n\n// ── TWEAKS\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"roseColor\": \"#f7abab\",\n  \"tickerActive\": true,\n  \"grainActive\": true,\n  \"cards3d\": true\n}/*EDITMODE-END*/;\nlet ts = { ...TWEAK_DEFAULTS };\n\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('active');\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('active');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\ndocument.getElementById('tw-rose').addEventListener('input', function() {\n  ts.roseColor = this.value;\n  document.documentElement.style.setProperty('--rose', this.value);\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { roseColor: this.value }}, '*');\n});\nfunction toggleTicker() {\n  ts.tickerActive = !ts.tickerActive;\n  const el = document.getElementById('tw-ticker');\n  el.classList.toggle('on', ts.tickerActive);\n  document.querySelector('.ticker-belt').style.display = ts.tickerActive ? '' : 'none';\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { tickerActive: ts.tickerActive }}, '*');\n}\nfunction toggleGrain() {\n  ts.grainActive = !ts.grainActive;\n  document.getElementById('tw-grain').classList.toggle('on', ts.grainActive);\n  document.body.classList.toggle('no-grain', !ts.grainActive);\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { grainActive: ts.grainActive }}, '*');\n}\nfunction toggle3D() {\n  tiltEnabled = !tiltEnabled;\n  ts.cards3d = tiltEnabled;\n  document.getElementById('tw-3d').classList.toggle('on', tiltEnabled);\n  if (!tiltEnabled) document.querySelectorAll('.product-card').forEach(c => c.style.transform = '');\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { cards3d: tiltEnabled }}, '*');\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
